name: CI
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Quick syntax check (no WinterCMS needed) ─────────────────────────────────

  lint:
    name: PHP Syntax
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

  # ── Functional tests: session-based curl checks against a live server ────────

  functional:
    name: Functional (WinterCMS 1.2.0)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wintercms
          POSTGRES_USER: createsystem
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          path: dbauth-src

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_pgsql, mbstring, xml, gd, curl, zip
          coverage: none

      - name: Check out setup scripts
        uses: actions/checkout@v4
        with:
          repository: anewholm/scripts
          path: scripts-repo

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-wintercms-1.2.0
          restore-keys: composer-wintercms-

      - name: Install WinterCMS + Acorn + DBAuth
        run: |
          bash scripts-repo/acorn-setup-new-winter \
            --winter-version=1.2.0 \
            --admin-password=testpassword123 \
            --db-username=createsystem \
            --db-password=testpassword \
            --db-host=127.0.0.1 \
            --acorn-github=anewholm/acorn \
            --dbauth-src=${{ github.workspace }}/dbauth-src \
            --no-interactive \
            --no-dbauth \
            --apply-l10-fix \
            --no-apache \
            --ci \
            --no-start-server \
            --install-dir=${{ github.workspace }} \
            wintercms

      # ── Set up DBAuth roles and sync admin password ───────────────────────────
      # dbauth:setup-access creates the named PG role (admin) and token role,
      # sets the cross-grant, enables auto_create_db_user, and syncs the password
      # to backend_users. Also creates the "artisan" role for ARTISAN_AUTO_LOGIN.
      #
      # DBAuth's register() unconditionally intercepts all pgsql connections,
      # even when DB_USERNAME != <DBAUTH>. On a login POST it substitutes the
      # form credentials, so the 'admin' role must exist before Phase A tests.

      - name: Set up DBAuth roles and admin credentials
        working-directory: ${{ github.workspace }}/wintercms
        run: php artisan dbauth:setup-access --login=admin --password=testpassword123 --enable-auto-create --artisan-role --artisan-password=testpassword

      # ── Phase A: DB_USERNAME=createsystem (standard WinterCMS login page) ─────
      # DBAuth is installed but the <DBAUTH> sentinel is not set. The standard
      # WinterCMS login form is shown. DBAuth still intercepts the pgsql connection
      # on POST, so login succeeds via the pre-created 'admin' PostgreSQL role.

      - name: Start PHP server (Phase A)
        working-directory: ${{ github.workspace }}/wintercms
        env:
          PHP_CLI_SERVER_WORKERS: 1
        run: nohup php artisan serve --port=8000 > /tmp/php-server.log 2>&1 &

      - name: Wait for PHP server
        run: |
          for i in $(seq 1 15); do
            curl -sfL http://localhost:8000/backend/backend/auth/signin -o /dev/null && break
            sleep 1
          done

      - name: Phase A — standard login page shown (not DBAuth custom page)
        run: |
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" http://localhost:8000/backend/backend/auth/signin)
          BODY=$(curl -s -L -c /tmp/cookies_a.txt http://localhost:8000/backend/backend/auth/signin)
          echo "Status: $STATUS"
          echo "Body preview: ${BODY:0:400}"
          test "$STATUS" = "200"
          echo "$BODY" | grep -qi "login\|password\|Administration Area\|signin"
          echo "$BODY" | grep -qiv "Secure System"

      - name: Phase A — correct credentials login succeeds (302 redirect)
        run: |
          # Fetch login page, reusing existing session cookie so the CSRF token
          # is bound to the same session we will POST to.
          BODY=$(curl -s -L -c /tmp/cookies_a.txt -b /tmp/cookies_a.txt http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          echo "Extracted CSRF token: ${TOKEN:0:10}..."
          test -n "$TOKEN"

          # POST login — capture full response body so failures are diagnosable.
          # Use --data-urlencode for the token to survive any base64 special chars.
          # Do NOT follow redirect (-L): a 302 is sufficient proof of success.
          LOGINRESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -c /tmp/cookies_a.txt -b /tmp/cookies_a.txt \
            --data-urlencode "_token=$TOKEN" \
            -d "postback=1&login=admin&password=testpassword123" \
            http://localhost:8000/backend/backend/auth/signin)
          STATUS=$(echo "$LOGINRESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "Phase A login status: $STATUS"
          if [ "$STATUS" != "302" ]; then
            echo "=== Login response body (first 60 lines) ==="
            echo "$LOGINRESPONSE" | grep -v "HTTP_STATUS:" | head -60
          fi
          test "$STATUS" = "302"
          echo "Phase A login: OK"

      - name: Phase A — bad credentials return error (not 500)
        run: |
          BODY=$(curl -s -L -c /tmp/cookies_bad.txt http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -c /tmp/cookies_bad.txt -b /tmp/cookies_bad.txt \
            -d "_token=$TOKEN&postback=1&login=nobody&password=wrongpassword" \
            http://localhost:8000/backend/backend/auth/signin)
          echo "Bad credentials status: $STATUS"
          test "$STATUS" != "500"
          test "$STATUS" != "000"

      - name: Phase A — empty credentials return error (not 500)
        run: |
          BODY=$(curl -s -L -c /tmp/cookies_empty.txt -b /tmp/cookies_empty.txt http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -c /tmp/cookies_empty.txt -b /tmp/cookies_empty.txt \
            --data-urlencode "_token=$TOKEN" \
            -d "postback=1&login=&password=" \
            http://localhost:8000/backend/backend/auth/signin)
          echo "Empty credentials status: $STATUS"
          test "$STATUS" != "500"
          test "$STATUS" != "000"

      - name: Phase A — SQL injection attempt handled safely (not 500)
        run: |
          BODY=$(curl -s -L -c /tmp/cookies_sqli.txt -b /tmp/cookies_sqli.txt http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -c /tmp/cookies_sqli.txt -b /tmp/cookies_sqli.txt \
            --data-urlencode "_token=$TOKEN" \
            --data-urlencode "login=' OR '1'='1'--" \
            --data-urlencode "password=anything" \
            -d "postback=1" \
            http://localhost:8000/backend/backend/auth/signin)
          echo "SQL injection attempt status: $STATUS"
          test "$STATUS" != "500"
          test "$STATUS" != "000"

      - name: Phase A — create testuser2 backend user
        working-directory: ${{ github.workspace }}/wintercms
        run: |
          php -r '
          define("LARAVEL_START", microtime(true));
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();
          $u = new Backend\Models\User;
          $u->login = "testuser2";
          $u->email = "testuser2@example.com";
          $u->password = "testpassword123";
          $u->password_confirmation = "testpassword123";
          $u->first_name = "Test";
          $u->last_name = "UserTwo";
          $u->is_activated = true;
          $u->forceSave();
          echo "Created testuser2 ID=" . $u->id . "\n";
          '

      - name: Phase A — set up testuser2 PostgreSQL roles via dbauth:setup-access
        working-directory: ${{ github.workspace }}/wintercms
        run: php artisan dbauth:setup-access --login=testuser2 --password=testpassword123

      - name: Phase A — testuser2 named PostgreSQL role created
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM pg_roles WHERE rolname = 'testuser2';" | tr -d ' ')
          echo "testuser2 named role count: $COUNT"
          test "$COUNT" = "1"

      - name: Phase A — testuser2 token PostgreSQL role created
        run: |
          ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM backend_users WHERE login = 'testuser2';" | tr -d ' ')
          echo "testuser2 backend user ID: $ID"
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM pg_roles WHERE rolname = 'token_wintercms_$ID';" | tr -d ' ')
          echo "testuser2 token role (token_wintercms_$ID): $COUNT"
          test "$COUNT" = "1"

      - name: Phase A — create noroleuser without PostgreSQL roles (for Phase B graceful-error test)
        working-directory: ${{ github.workspace }}/wintercms
        run: |
          php -r '
          define("LARAVEL_START", microtime(true));
          require "vendor/autoload.php";
          $app = require "bootstrap/app.php";
          $app->make("Illuminate\Contracts\Console\Kernel")->bootstrap();
          $u = new Backend\Models\User;
          $u->login = "noroleuser";
          $u->email = "norole@example.com";
          $u->password = "testpassword123";
          $u->password_confirmation = "testpassword123";
          $u->first_name = "No";
          $u->last_name = "Role";
          $u->is_activated = true;
          $u->forceSave();
          echo "noroleuser created ID=" . $u->id . "\n";
          '
          NOROLE_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM backend_users WHERE login = 'noroleuser';" | tr -d ' ')
          PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -c "DROP ROLE IF EXISTS noroleuser;"
          PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -c "DROP ROLE IF EXISTS token_wintercms_$NOROLE_ID;"
          echo "noroleuser PG roles dropped — Phase B will test graceful error on login"

      - name: Stop PHP server
        run: pkill -f "artisan" || true

      # ── Phase B: DB_USERNAME=<DBAUTH> (DBAuth active — custom login page) ──────

      - name: Switch .env to DBAuth sentinel (Phase B)
        working-directory: ${{ github.workspace }}/wintercms
        run: |
          sed -i 's/DB_USERNAME=createsystem/DB_USERNAME=<DBAUTH>/' .env
          sed -i 's/DB_PASSWORD=testpassword/DB_PASSWORD=<DBAUTH>/' .env
          # ARTISAN_AUTO_LOGIN=1 makes ServiceProvider::showLoginScreen() use the
          # "artisan" PostgreSQL role (created above) instead of prompting stdin.
          # Without this, "php artisan serve" hangs waiting for console input.
          printf '\nARTISAN_AUTO_LOGIN=1\nARTISAN_DEV_PASSWORD=testpassword\n' >> .env

      - name: Start PHP server (Phase B)
        working-directory: ${{ github.workspace }}/wintercms
        env:
          PHP_CLI_SERVER_WORKERS: 1
        run: nohup php artisan serve --port=8000 > /tmp/php-server-b.log 2>&1 &

      - name: Wait for PHP server
        run: |
          for i in $(seq 1 15); do
            curl -sfL http://localhost:8000/backend/backend/auth/signin -o /dev/null && break
            sleep 1
          done

      - name: Phase B — DBAuth custom login page served
        run: |
          BODY=$(curl -s -L http://localhost:8000/backend/backend/auth/signin)
          echo "$BODY" | grep -q "Secure System" \
            || (echo "ERROR: DBAuth custom login page not shown"; echo "$BODY" | head -30; exit 1)
          echo "Phase B custom login page: OK (contains 'Secure System')"

      - name: Phase B — bad credentials show error (not 500)
        run: |
          # GET the login page first, saving the session cookie.
          # The CSRF token is session-bound: the session that generated it must be
          # the same one that receives the POST, otherwise CSRF validation fails.
          BODY=$(curl -s -L -c /tmp/cookies_b_bad.txt -b /tmp/cookies_b_bad.txt \
            http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          test -n "$TOKEN"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -c /tmp/cookies_b_bad.txt -b /tmp/cookies_b_bad.txt \
            --data-urlencode "_token=$TOKEN" \
            -d "postback=1&login=nobody&password=wrongpassword" \
            http://localhost:8000/backend/backend/auth/signin)
          echo "Phase B bad login status: $STATUS"
          test "$STATUS" != "500"
          test "$STATUS" != "000"

      - name: Phase B — correct credentials authenticate via PostgreSQL role
        run: |
          # GET the login page first to establish a session and obtain the CSRF token.
          echo "=== Phase B GET headers ==="
          curl -s -D - -L -c /tmp/cookies_b.txt -b /tmp/cookies_b.txt \
            http://localhost:8000/backend/backend/auth/signin -o /tmp/phase_b_body.html
          echo "=== Cookie jar after GET ==="
          cat /tmp/cookies_b.txt
          BODY=$(cat /tmp/phase_b_body.html)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          echo "Phase B CSRF token: ${TOKEN:0:10}..."
          test -n "$TOKEN"
          LOGINRESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -c /tmp/cookies_b.txt -b /tmp/cookies_b.txt \
            --data-urlencode "_token=$TOKEN" \
            --data-urlencode "login=admin" \
            --data-urlencode "password=testpassword123" \
            -d "postback=1" \
            http://localhost:8000/backend/backend/auth/signin)
          STATUS=$(echo "$LOGINRESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "Phase B login status: $STATUS"
          if [ "$STATUS" != "302" ]; then
            echo "=== Phase B login response (first 60 lines) ==="
            echo "$LOGINRESPONSE" | grep -v "HTTP_STATUS:" | head -60
          fi
          test "$STATUS" = "302"
          echo "Phase B login with PostgreSQL role: OK"

      - name: Phase B — backend dashboard accessible after login
        run: |
          STATUS=$(curl -s -o /tmp/dashboard_b.html -w "%{http_code}" \
            -L -c /tmp/cookies_b.txt -b /tmp/cookies_b.txt \
            http://localhost:8000/backend)
          echo "Dashboard status: $STATUS"
          test "$STATUS" = "200"
          grep -qi "dashboard\|backend\|Administration\|Users" /tmp/dashboard_b.html
          echo "Phase B dashboard: OK"

      - name: Phase B — backend users list accessible
        run: |
          STATUS=$(curl -s -o /tmp/users_list.html -w "%{http_code}" \
            -L -c /tmp/cookies_b.txt -b /tmp/cookies_b.txt \
            http://localhost:8000/backend/backend/users)
          echo "Users list status: $STATUS"
          test "$STATUS" = "200"

      - name: Phase B — admin named PostgreSQL role exists
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM pg_roles WHERE rolname = 'admin';" | tr -d ' ')
          echo "admin PG role count: $COUNT"
          test "$COUNT" = "1"

      - name: Phase B — admin PostgreSQL role has CREATEROLE attribute
        run: |
          ATTR=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT rolcreaterole::text FROM pg_roles WHERE rolname = 'admin';" | tr -d ' ')
          echo "admin rolcreaterole: $ATTR"
          test "$ATTR" = "true"

      - name: Phase B — admin token PostgreSQL role exists
        run: |
          ADMIN_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM backend_users WHERE login = 'admin';" | tr -d ' ')
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM pg_roles WHERE rolname = 'token_wintercms_$ADMIN_ID';" | tr -d ' ')
          echo "admin token role (token_wintercms_$ADMIN_ID): $COUNT"
          test "$COUNT" = "1"

      - name: Phase B — testuser2 login via DBAuth
        run: |
          BODY=$(curl -s -L -c /tmp/cookies_b2.txt -b /tmp/cookies_b2.txt \
            http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          test -n "$TOKEN"
          LOGINRESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -c /tmp/cookies_b2.txt -b /tmp/cookies_b2.txt \
            --data-urlencode "_token=$TOKEN" \
            --data-urlencode "login=testuser2" \
            --data-urlencode "password=testpassword123" \
            -d "postback=1" \
            http://localhost:8000/backend/backend/auth/signin)
          STATUS=$(echo "$LOGINRESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "testuser2 login status: $STATUS"
          if [ "$STATUS" != "302" ]; then
            echo "$LOGINRESPONSE" | grep -v "HTTP_STATUS:" | head -40
          fi
          test "$STATUS" = "302"
          echo "testuser2 DBAuth login: OK"

      - name: Phase B — testuser2 backend accessible after login
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -L -c /tmp/cookies_b2.txt -b /tmp/cookies_b2.txt \
            http://localhost:8000/backend)
          echo "testuser2 backend status: $STATUS"
          test "$STATUS" = "200"

      - name: Phase B — concurrent admin session (independent second browser session)
        run: |
          BODY=$(curl -s -L -c /tmp/cookies_b3.txt -b /tmp/cookies_b3.txt \
            http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          test -n "$TOKEN"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -c /tmp/cookies_b3.txt -b /tmp/cookies_b3.txt \
            --data-urlencode "_token=$TOKEN" \
            --data-urlencode "login=admin" \
            --data-urlencode "password=testpassword123" \
            -d "postback=1" \
            http://localhost:8000/backend/backend/auth/signin)
          echo "Concurrent admin session login: $STATUS"
          test "$STATUS" = "302"
          echo "Both admin and testuser2 sessions operational concurrently: OK"

      - name: Phase B — unauthenticated request shows login page (not 500)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            http://localhost:8000/backend/backend/auth/signin)
          echo "Unauthenticated request status: $STATUS"
          test "$STATUS" = "200"

      - name: Phase B — backend user without PostgreSQL role handled gracefully (not 500)
        run: |
          # noroleuser was created in Phase A with its PG roles immediately dropped.
          # DBAuth must show an error page, not 500.
          BODY=$(curl -s -L -c /tmp/cookies_norole.txt -b /tmp/cookies_norole.txt \
            http://localhost:8000/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -c /tmp/cookies_norole.txt -b /tmp/cookies_norole.txt \
            --data-urlencode "_token=$TOKEN" \
            --data-urlencode "login=noroleuser" \
            --data-urlencode "password=testpassword123" \
            -d "postback=1" \
            http://localhost:8000/backend/backend/auth/signin)
          echo "Login without PG role: $STATUS (must not be 500)"
          test "$STATUS" != "500"
          test "$STATUS" != "000"
          echo "DBAuth handles missing PG role gracefully: OK"

      - name: Dump PHP server logs on failure
        if: failure()
        run: |
          echo "=== Phase A server log ===" ; cat /tmp/php-server.log || true
          echo "=== Phase B server log ===" ; cat /tmp/php-server-b.log || true
